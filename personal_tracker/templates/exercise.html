{% extends 'base.html' %}
{% block content %}
<h1>🏃 Exercise</h1>

<form method="POST" action="/exercise">
    <input type="hidden" name="offset_min" id="offset_min" value="0">
    <input type="hidden" name="intensity"  id="intensity_val" value="">

    <div class="offset-label">How long ago?</div>
    <div class="offset-buttons" id="offset-btns">
        <button type="button" class="offset-btn active" data-val="0">Now</button>
        <button type="button" class="offset-btn" data-val="5">5m</button>
        <button type="button" class="offset-btn" data-val="10">10m</button>
        <button type="button" class="offset-btn" data-val="15">15m</button>
        <button type="button" class="offset-btn" data-val="20">20m</button>
        <button type="button" class="offset-btn" data-val="30">30m</button>
        <button type="button" class="offset-btn" data-val="60">1h</button>
        <button type="button" class="offset-btn" data-val="custom">...</button>
    </div>
    <div class="custom-offset" id="custom-div">
        <input type="number" id="custom_offset_input" placeholder="minutes ago" min="0">
    </div>

    <label>Type</label>
    <div class="cat-grid">
        {% for t in exercise_types %}
        <button type="button" class="cat-btn" data-val="{{ t }}" onclick="setExType(this)">{{ t }}</button>
        {% endfor %}
    </div>
    <input type="hidden" name="type" id="ex_type" value="">

    <label>Duration (minutes)</label>
    <input type="number" name="duration_min" placeholder="e.g. 30" min="1">

    <label>Intensity</label>
    <div class="rating-row">
        <button type="button" class="rating-btn" data-val="1" onclick="setIntensity(this)">😴<br>Easy</button>
        <button type="button" class="rating-btn" data-val="2" onclick="setIntensity(this)">🚶<br>Light</button>
        <button type="button" class="rating-btn" data-val="3" onclick="setIntensity(this)">🏃<br>Mod</button>
        <button type="button" class="rating-btn" data-val="4" onclick="setIntensity(this)">💪<br>Hard</button>
        <button type="button" class="rating-btn" data-val="5" onclick="setIntensity(this)">🔥<br>Max</button>
    </div>

    <button type="submit" class="btn btn-submit">Save</button>
    <a href="/" class="btn btn-back">Back</a>
</form>

<script>
document.addEventListener('DOMContentLoaded', function() {
    initOffset('#offset-btns .offset-btn', 'offset_min', 'custom-div', 'custom_offset_input');

    window.setExType = function(btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('ex_type').value = btn.dataset.val;
    };
    window.setIntensity = function(btn) {
        document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('intensity_val').value = btn.dataset.val;
    };
});
</script>
{% endblock %}
